<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{font-family:'DM Sans',sans-serif;background:#0b0d10;color:#ddd;overscroll-behavior:none}
  input:focus,button:focus{outline:none}
  button{-webkit-appearance:none;appearance:none}
  ::-webkit-scrollbar{width:0;display:none}
  .mono{font-family:'JetBrains Mono',monospace}

  #app{max-width:460px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
  .header{display:flex;justify-content:space-between;align-items:flex-start;padding:env(safe-area-inset-top,12px) 18px 0;flex-shrink:0;padding-top:calc(env(safe-area-inset-top,12px) + 12px)}
  .logo{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#c9a84c}
  .sub{font-size:11px;color:#666;margin-top:2px}
  .badge{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:4px 11px;font-size:13px;font-weight:700;color:#c9a84c}

  .tabs{display:flex;gap:3px;padding:12px 18px 6px;flex-shrink:0}
  .tabs button{flex:1;padding:8px 0;border-radius:8px;border:none;background:transparent;color:#666;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s}
  .tabs button.on{background:#171a20;color:#c9a84c}

  .body{flex:1;overflow-y:auto;padding:6px 18px 100px;-webkit-overflow-scrolling:touch}

  .card{background:#111419;border:1px solid #1e2128;border-radius:16px;padding:20px;margin-bottom:12px}
  .card-label{font-size:11px;color:#777}
  .card-big{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:700;margin:5px 0 8px;line-height:1}
  .card-meta{font-size:12px;color:#555}
  .divider{height:1px;background:#1e2128;margin:14px 0}
  .today-row{display:flex;justify-content:space-between;margin-bottom:6px}
  .today-row span{font-size:11px;color:#777}
  .today-row .r{color:#888;font-family:'JetBrains Mono',monospace}
  .bar-bg{height:5px;background:#1e2128;border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
  .today-sub{font-size:10px;color:#555;margin-top:5px}

  .warn{border-radius:12px;padding:16px;margin-bottom:12px;border-left:3px solid;background:rgba(255,255,255,.02)}
  .warn-title{font-size:13px;font-weight:700;margin-bottom:3px}
  .warn-text{font-size:12px;color:#999;line-height:1.5}
  .rec{margin-top:8px;padding:10px;background:rgba(0,0,0,.3);border-radius:8px}
  .rec-title{font-size:12px;font-weight:700;color:#c9a84c;margin-bottom:3px}
  .rec-text{font-size:11px;color:#999;line-height:1.6}

  .row{display:flex;gap:8px;margin-bottom:12px}
  .mini{flex:1;background:#111419;border:1px solid #1e2128;border-radius:10px;padding:12px}
  .mini-label{font-size:10px;color:#666;margin-bottom:3px}
  .mini-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}

  .chart-wrap{background:#111419;border:1px solid #1e2128;border-radius:12px;padding:16px;margin-bottom:12px}
  .chart-title{font-size:11px;color:#666;margin-bottom:12px}
  .chart-box{position:relative;height:100px}
  .budget-line{position:absolute;left:0;right:0;border-top:1px dashed rgba(201,168,76,.25);z-index:1}
  .bars{display:flex;gap:5px;height:100%;align-items:flex-end}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%}
  .bar-track{flex:1;width:100%;position:relative}
  .bar-inner{position:absolute;bottom:0;left:0;right:0;border-radius:3px 3px 0 0;opacity:.75;transition:height .5s ease}
  .bar-label{font-size:9px;color:#555;margin-top:4px;font-family:'JetBrains Mono',monospace}

  .reset-btn{width:100%;padding:10px;border:1px solid #222;border-radius:8px;background:transparent;color:#555;font-size:11px;cursor:pointer;font-family:inherit}

  .add-wrap{background:#111419;border:1px solid #1e2128;border-radius:16px;padding:20px}
  .add-heading{font-size:16px;font-weight:700;color:#c9a84c;margin-bottom:18px}
  .field-label{font-size:11px;color:#666;margin-bottom:5px}
  .big-input{width:100%;padding:12px;border-radius:10px;border:1px solid #252830;background:#0b0d10;font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#ddd;text-align:center;margin-bottom:16px}
  .text-input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #252830;background:#0b0d10;font-family:inherit;font-size:13px;color:#ddd;margin-bottom:16px}
  .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
  .cat-chip{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 2px;border-radius:8px;border:1px solid #252830;background:#0b0d10;cursor:pointer;transition:all .15s}
  .cat-chip.on{border-color:#c9a84c;background:rgba(201,168,76,.08)}
  .cat-chip span:last-child{font-size:9px;color:#999}
  .primary-btn{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#c9a84c,#b8963a);color:#0b0d10;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
  .preview{text-align:center;font-size:11px;color:#666;margin-top:10px}

  .sec-title{font-size:13px;font-weight:700;color:#888;margin-bottom:12px}
  .empty{text-align:center;padding:40px 0}
  .list{background:#111419;border-radius:12px;overflow:hidden;border:1px solid #1e2128}
  .entry{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-bottom:1px solid #1a1d22}
  .entry-left{display:flex;align-items:center;gap:9px}
  .entry-amt{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
  .entry-meta{font-size:10px;color:#555}
  .del-btn{background:none;border:none;color:#555;font-size:13px;cursor:pointer;padding:6px}
  .del-confirm{display:flex;gap:5px}
  .del-yes{padding:4px 10px;border-radius:5px;border:none;background:#dc2626;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
  .del-no{padding:4px 10px;border-radius:5px;border:1px solid #333;background:transparent;color:#999;font-size:11px;cursor:pointer;font-family:inherit}

  .cat-breakdown{background:#111419;border:1px solid #1e2128;border-radius:12px;padding:14px;margin-bottom:14px}
  .cat-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .cat-row-left{display:flex;align-items:center;gap:5px;width:72px}
  .cat-row-left span:last-child{font-size:11px;color:#999}
  .cat-bar-bg{flex:1;height:5px;background:#1e2128;border-radius:3px;overflow:hidden}
  .cat-bar-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#dbb85e);border-radius:3px;transition:width .4s}
  .cat-amt{font-family:'JetBrains Mono',monospace;font-size:11px;color:#888;width:68px;text-align:right}

  .streak-card{display:flex;align-items:center;gap:12px;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.12);border-radius:12px;padding:16px}
  .streak-count{font-size:16px;font-weight:700;color:#c9a84c}
  .streak-sub{font-size:11px;color:#777}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1d24;border:1px solid #2a2d34;border-radius:10px;padding:9px 18px;font-size:13px;color:#c9a84c;z-index:999;font-weight:500;animation:ts .3s ease}

  @keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes ts{from{opacity:0;transform:translate(-50%,16px)}to{opacity:1;transform:translate(-50%,0)}}
  .af{animation:fu .3s ease both}

  .gold{color:#c9a84c}
  .green{color:#4ade80}
  .red{color:#ef4444}
  .yellow{color:#eab308}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CATS = [
  {id:"food",label:"Food",emoji:"🍛"},{id:"transport",label:"Transport",emoji:"🚗"},
  {id:"shopping",label:"Shopping",emoji:"🛍️"},{id:"bills",label:"Bills",emoji:"📄"},
  {id:"health",label:"Health",emoji:"💊"},{id:"entertainment",label:"Fun",emoji:"🎮"},
  {id:"other",label:"Other",emoji:"📌"}
];
const BUDGET=35000, DAYS=30, IDEAL=1000, WLOW=800, WCRIT=700;
const $=s=>document.querySelector(s);
const fmt=n=>"Rs "+Math.round(n).toLocaleString();

function today(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function dayOfCycle(cs){
  const n=new Date();n.setHours(0,0,0,0);
  const s=new Date(cs);s.setHours(0,0,0,0);
  return Math.max(0,Math.min(Math.floor((n-s)/864e5),DAYS-1));
}
function dateLabel(ds){
  const d=new Date(ds+"T00:00:00"),t=new Date();t.setHours(0,0,0,0);
  const y=new Date(t);y.setDate(t.getDate()-1);
  if(d.getTime()===t.getTime())return"Today";
  if(d.getTime()===y.getTime())return"Yesterday";
  return d.toLocaleDateString("en-US",{day:"numeric",month:"short"});
}

function loadData(){
  try{const d=JSON.parse(localStorage.getItem("paisa-v5"));
    if(d&&d.cycleStart&&Array.isArray(d.entries)){
      if(dayOfCycle(d.cycleStart)>=DAYS)return null;
      return d;
    }
  }catch(e){}
  return null;
}
function saveData(d){try{localStorage.setItem("paisa-v5",JSON.stringify(d))}catch(e){}}
function fresh(){return{cycleStart:today(),entries:[]}}

let data=loadData()||fresh();
if(!loadData())saveData(data);
let tab="home", delId=null, toastTimer=null, selectedCat="food";

function calc(){
  const di=dayOfCycle(data.cycleStart);
  const elapsed=di+1, left=Math.max(1,DAYS-di);
  const spent=data.entries.reduce((s,e)=>s+e.amount,0);
  const rem=Math.max(0,BUDGET-spent), daily=Math.round(rem/left);
  const avg=elapsed>0?Math.round(spent/elapsed):0;
  const td=today();
  const tSpent=data.entries.filter(e=>e.date===td).reduce((s,e)=>s+e.amount,0);
  const tLeft=Math.max(0,daily-tSpent);

  let warn="ok";
  if(daily<WCRIT)warn="critical";else if(daily<WLOW)warn="warning";

  let rec=null;
  if(daily<IDEAL&&left>3){
    const s3=Math.max(200,Math.round((rem-IDEAL*(left-3))/3));
    const aft=Math.round((rem-s3*3)/Math.max(1,left-3));
    if(s3<daily&&aft>daily)rec={spend:s3,after:aft};
  }

  const dMap={};
  data.entries.forEach(e=>{dMap[e.date]=(dMap[e.date]||0)+e.amount});

  const base=Math.round(BUDGET/DAYS);
  let streak=0;
  for(let i=di;i>=0;i--){
    const d=new Date(data.cycleStart+"T00:00:00");d.setDate(d.getDate()+i);
    const k=d.toISOString().split("T")[0];
    if((dMap[k]||0)<=base*1.1)streak++;else break;
  }

  const days=[];
  for(let i=0;i<elapsed;i++){
    const d=new Date(data.cycleStart+"T00:00:00");d.setDate(d.getDate()+i);
    const k=d.toISOString().split("T")[0];
    days.push({date:k,spent:dMap[k]||0});
  }
  const sorted=[...days].sort((a,b)=>a.spent-b.spent);
  const best=sorted[0]||null, worst=sorted[sorted.length-1]||null;

  const cMap={};
  data.entries.forEach(e=>{cMap[e.category]=(cMap[e.category]||0)+e.amount});
  const chart=days.slice(-7);

  return{elapsed,left,spent,rem,daily,avg,tSpent,tLeft,warn,rec,streak,best,worst,cMap,chart};
}

function showToast(m){
  const el=document.createElement("div");el.className="toast";el.textContent=m;
  document.body.appendChild(el);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.remove()},2000);
}

function render(){
  const s=calc();
  const cMax=Math.max(...s.chart.map(d=>d.spent),s.daily,100);

  let h=`
  <div class="header">
    <div><h1 class="logo">Paisa</h1><p class="sub">Day ${s.elapsed} of ${DAYS}</p></div>
    <div class="badge">🔥 ${s.streak}</div>
  </div>
  <div class="tabs">
    <button class="${tab==="home"?"on":""}" data-tab="home">Budget</button>
    <button class="${tab==="add"?"on":""}" data-tab="add">Add</button>
    <button class="${tab==="history"?"on":""}" data-tab="history">History</button>
    <button class="${tab==="insights"?"on":""}" data-tab="insights">Insights</button>
  </div>
  <div class="body">`;

  if(tab==="home"){
    const bc=s.warn==="critical"?"#ef4444":s.warn==="warning"?"#eab308":"#c9a84c";
    const br=s.warn==="critical"?"border-color:#ef4444":s.warn==="warning"?"border-color:#eab308":"";
    const bw=s.tSpent>s.daily?"#ef4444":s.tSpent>s.daily*.8?"#eab308":"#c9a84c";
    h+=`<div class="af">
      <div class="card" style="${br}">
        <p class="card-label">Daily budget</p>
        <p class="card-big" style="color:${bc}">${fmt(s.daily)}</p>
        <p class="card-meta">${fmt(s.rem)} left · ${s.left} days to go</p>
        <div class="divider"></div>
        <div class="today-row"><span>Today</span><span class="r">${fmt(s.tSpent)} spent</span></div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,(s.tSpent/Math.max(1,s.daily))*100)}%;background:${bw}"></div></div>
        <p class="today-sub">${s.tSpent>s.daily?`Over by ${fmt(s.tSpent-s.daily)}`:`${fmt(s.tLeft)} left today`}</p>
      </div>`;

    if(s.warn!=="ok"){
      const wc=s.warn==="critical"?"#ef4444":"#eab308";
      h+=`<div class="warn" style="border-left-color:${wc}">
        <p class="warn-title">${s.warn==="critical"?"⚠️ Budget Critical":"⚡ Getting Tight"}</p>
        <p class="warn-text">Daily budget (${fmt(s.daily)}) is below the safe zone of ${fmt(WLOW)}.</p>`;
      if(s.rec){
        h+=`<div class="rec"><p class="rec-title">Recovery Plan</p>
          <p class="rec-text">Spend only <strong class="gold">${fmt(s.rec.spend)}</strong>/day for 3 days → daily budget recovers to ~<strong class="green">${fmt(s.rec.after)}</strong></p></div>`;
      }
      h+=`</div>`;
    }

    h+=`<div class="row">
      <div class="mini"><p class="mini-label">Total Spent</p><p class="mini-val">${fmt(s.spent)}</p></div>
      <div class="mini"><p class="mini-label">Daily Avg</p><p class="mini-val">${fmt(s.avg)}</p></div>
    </div>`;

    if(s.chart.length>1){
      h+=`<div class="chart-wrap"><p class="chart-title">Last ${s.chart.length} days</p>
        <div class="chart-box">
          <div class="budget-line" style="bottom:${(s.daily/cMax)*100}%"></div>
          <div class="bars">`;
      s.chart.forEach(d=>{
        const ht=Math.max(3,(d.spent/cMax)*100);
        const c=d.spent>s.daily?"#ef4444":"#c9a84c";
        h+=`<div class="bar-col"><div class="bar-track"><div class="bar-inner" style="height:${ht}%;background:${c}"></div></div>
          <span class="bar-label">${new Date(d.date+"T00:00:00").getDate()}</span></div>`;
      });
      h+=`</div></div></div>`;
    }

    h+=`<button class="reset-btn" id="reset">Reset Cycle</button></div>`;
  }

  else if(tab==="add"){
    h+=`<div class="af"><div class="add-wrap">
      <p class="add-heading">Add Expense</p>
      <p class="field-label">Amount (PKR)</p>
      <input type="number" inputmode="numeric" id="amt" placeholder="0" class="big-input" autofocus>
      <p class="field-label">Category</p>
      <div class="cat-grid">`;
    CATS.forEach(c=>{
      h+=`<div class="cat-chip ${c.id===selectedCat?"on":""}" data-cat="${c.id}">
        <span style="font-size:16px">${c.emoji}</span><span>${c.label}</span></div>`;
    });
    h+=`</div>
      <p class="field-label">Note (optional)</p>
      <input type="text" id="note" placeholder="What was this for?" class="text-input">
      <button class="primary-btn" id="add-btn" style="opacity:.35">Add Expense</button>
      <p class="preview" id="preview"></p>
    </div></div>`;
  }

  else if(tab==="history"){
    h+=`<div class="af"><p class="sec-title">All Entries (${data.entries.length})</p>`;
    if(!data.entries.length){
      h+=`<div class="empty"><p style="font-size:32px;margin-bottom:6px">📭</p><p style="color:#555;font-size:12px">No expenses yet</p></div>`;
    } else {
      h+=`<div class="list">`;
      [...data.entries].reverse().forEach(e=>{
        const c=CATS.find(x=>x.id===e.category)||CATS[6];
        h+=`<div class="entry"><div class="entry-left">
          <span style="font-size:18px">${c.emoji}</span>
          <div><p class="entry-amt">${fmt(e.amount)}</p>
          <p class="entry-meta">${c.label}${e.note?` · ${e.note}`:""} · ${dateLabel(e.date)} ${e.time}</p></div></div>`;
        if(delId===e.id){
          h+=`<div class="del-confirm"><button class="del-yes" data-rm="${e.id}">Delete</button><button class="del-no" data-cancel>Cancel</button></div>`;
        } else {
          h+=`<button class="del-btn" data-del="${e.id}">✕</button>`;
        }
        h+=`</div>`;
      });
      h+=`</div>`;
    }
    h+=`</div>`;
  }

  else if(tab==="insights"){
    h+=`<div class="af"><p class="sec-title">Best & Worst Days</p>
    <div class="row">
      <div class="mini" style="border-left:3px solid #4ade80"><p class="mini-label">🏆 Best</p>`;
    if(s.best){h+=`<p class="mini-val green">${fmt(s.best.spent)}</p><p style="font-size:10px;color:#555;margin-top:1px">${dateLabel(s.best.date)}</p>`}
    else{h+=`<p class="mini-val">—</p>`}
    h+=`</div><div class="mini" style="border-left:3px solid #ef4444"><p class="mini-label">💸 Worst</p>`;
    if(s.worst){h+=`<p class="mini-val red">${fmt(s.worst.spent)}</p><p style="font-size:10px;color:#555;margin-top:1px">${dateLabel(s.worst.date)}</p>`}
    else{h+=`<p class="mini-val">—</p>`}
    h+=`</div></div>`;

    h+=`<p class="sec-title" style="margin-top:8px">By Category</p><div class="cat-breakdown">`;
    let hasCat=false;
    CATS.forEach(c=>{
      const a=s.cMap[c.id]||0;if(!a)return;hasCat=true;
      const pct=(a/Math.max(1,s.spent))*100;
      h+=`<div class="cat-row"><div class="cat-row-left"><span>${c.emoji}</span><span>${c.label}</span></div>
        <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
        <span class="cat-amt">${fmt(a)}</span></div>`;
    });
    if(!hasCat)h+=`<p style="color:#555;font-size:12px;text-align:center;padding:16px">No data yet</p>`;
    h+=`</div>`;

    h+=`<div class="streak-card"><span style="font-size:28px">🔥</span>
      <div><p class="streak-count">${s.streak} day streak</p><p class="streak-sub">Consecutive days within budget</p></div></div></div>`;
  }

  h+=`</div>`;
  $("#app").innerHTML=h;
  bindEvents();
}

function bindEvents(){
  document.querySelectorAll("[data-tab]").forEach(b=>{
    b.addEventListener("click",()=>{tab=b.dataset.tab;delId=null;render()});
  });

  const reset=$("#reset");
  if(reset)reset.addEventListener("click",()=>{data=fresh();saveData(data);showToast("Cycle reset!");render()});

  // Add tab
  const amtEl=$("#amt"), noteEl=$("#note"), addBtn=$("#add-btn"), prevEl=$("#preview");

  document.querySelectorAll("[data-cat]").forEach(el=>{
    el.addEventListener("click",()=>{
      selectedCat=el.dataset.cat;
      document.querySelectorAll("[data-cat]").forEach(c=>c.classList.toggle("on",c.dataset.cat===selectedCat));
    });
  });

  if(amtEl){
    const update=()=>{
      const v=parseInt(amtEl.value);
      if(addBtn)addBtn.style.opacity=v>0?"1":".35";
      if(prevEl&&v>0){
        const s=calc();
        prevEl.textContent=`After this → ${fmt(Math.max(0,(s.rem-v)/Math.max(1,s.left)))}/day`;
      } else if(prevEl){prevEl.textContent=""}
    };
    amtEl.addEventListener("input",update);
    // Restore focus
    setTimeout(()=>amtEl.focus(),100);
  }

  if(addBtn)addBtn.addEventListener("click",()=>{
    const v=parseInt(amtEl?.value);
    if(!v||v<=0)return;
    data.entries.push({
      id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
      amount:v,category:selectedCat,note:(noteEl?.value||"").trim(),
      date:today(),
      time:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"})
    });
    saveData(data);showToast("Added!");selectedCat="food";tab="home";render();
  });

  // History
  document.querySelectorAll("[data-del]").forEach(b=>{
    b.addEventListener("click",()=>{delId=b.dataset.del;render()});
  });
  document.querySelectorAll("[data-rm]").forEach(b=>{
    b.addEventListener("click",()=>{
      data.entries=data.entries.filter(e=>e.id!==b.dataset.rm);
      saveData(data);delId=null;showToast("Removed");render();
    });
  });
  document.querySelectorAll("[data-cancel]").forEach(b=>{
    b.addEventListener("click",()=>{delId=null;render()});
  });
}

render();
</script>
</body>
</html>
